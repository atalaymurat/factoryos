
services:
  postgres:
    image: postgres:16
    container_name: factoryos-postgres
    restart: always
    env_file:
      - ./config/env/common.env
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
      - ./apps/integration-service/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factoryos -d factoryos"]
      interval: 5s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:latest
    container_name: factoryos-emqx
    restart: always
    ports:
      - "1883:1883"
      - "${EMQX_DASHBOARD_PORT}:18083"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
  
  integration-service:
    image: node:20
    container_name: factoryos-integration
    restart: always
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
    env_file:
      - ./config/env/common.env
    volumes:
      - ./apps/integration-service:/app
    command: ["sh", "-c", "npm install && node src/index.js"]
    ports:
      - "${INTEGRATION_PORT}:3000"

volumes:
  emqx-data:
  emqx-log: