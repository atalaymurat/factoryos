
services:
  postgres:
    image: postgres:16
    container_name: factoryos-postgres
    restart: always
    env_file:
      - ./config/env/common.env
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
      - ./apps/integration-service/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factoryos -d factoryos"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: factoryos-mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "${MQTT_WS_PORT:-8083}:8083"
    volumes:
      - ./apps/mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3
  

  
  integration-service:
    build:
      context: ./apps/integration-service
      dockerfile: Dockerfile
    container_name: factoryos-integration
    restart: always
    env_file:
      - ./config/env/common.env
    ports:
      - "${INTEGRATION_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
 

volumes:
  mosquitto-data:
  mosquitto-log:
